<!DOCTYPE html>
<html>
<head>
<title>WorkSafe Report</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.container {
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

h1 {
    text-align:center;
}

label {
    font-weight:bold;
}

input, textarea, select, button {
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

button {
    background:#1976d2;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover {
    background:#125aa0;
}

.anonymous {
    display:flex;
    align-items:center;
}

.anonymous input {
    width:auto;
    margin-right:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Work Report</h1>

<form id="reportForm">

<label>Report Type</label>

<select id="type">
<option>Safety Concern</option>
<option>Near Miss</option>
<option>Equipment Issue</option>
<option>Environmental Issue</option>
<option>Suggestion</option>
</select>


<label>Description</label>

<textarea id="description" rows="6"
placeholder="Describe what happened..."></textarea>


<label>Your Name (optional)</label>

<input id="name" placeholder="Leave blank for anonymous">


<label>Location</label>

<input id="location" placeholder="Where did it happen?">


<label>Photo (optional)</label>

<input type="file" id="photo">


<div class="anonymous">
<input type="checkbox" id="anonymous">
<label>Submit anonymously</label>
</div>


<button type="submit">
Submit Report
</button>


</form>

<p id="result"></p>

</div>


<script>

document.getElementById("reportForm")
.addEventListener("submit", function(e){

e.preventDefault();


let report = {

type: document.getElementById("type").value,

description:
document.getElementById("description").value,

name:
document.getElementById("anonymous").checked
? "Anonymous"
: document.getElementById("name").value,

location:
document.getElementById("location").value,

date:
new Date().toLocaleString()

};


// Temporary storage for testing
localStorage.setItem(
"lastReport",
JSON.stringify(report)
);


document.getElementById("result").innerHTML =
"Report submitted successfully";


console.log(report);


});


</script>


</body>
</html>
